  shard_condition: ""
  
  query_create_stats_pivot_view: |
    CREATE VIEW stats_pivot_view AS  
    SELECT 
        g.INVO_ADMNO,
        g.INVO_CLNTNO,
        g.INVO_DEBH_NO,
        g.INVO_DEBC_NO,
        g.DZIEN,        
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN AVG_DNI_DO_ZAPLATY     END) AS F7_11_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN STDEV_DNI_DO_ZAPLATY   END) AS F7_11_STDEV_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN AVG_DNI_OPOZNIENIA     END) AS F7_11_AVG_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN STDEV_DNI_OPOZNIENIA   END) AS F7_11_STDEV_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN SUM_INVO_AINITIALH     END) AS F7_11_SUM_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN AVG_INVO_AINITIALH     END) AS F7_11_AVG_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN STDEV_INVO_AINITIALH   END) AS F7_11_STDEV_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN ILE_FAKTUR             END) AS F7_11_ILE_FAKTUR,

        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN AVG_DNI_DO_ZAPLATY   END) AS F7_10_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN STDEV_DNI_DO_ZAPLATY END) AS F7_10_STDEV_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN AVG_DNI_OPOZNIENIA   END) AS F7_10_AVG_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN STDEV_DNI_OPOZNIENIA END) AS F7_10_STDEV_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN SUM_INVO_AINITIALH   END) AS F7_10_SUM_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN AVG_INVO_AINITIALH   END) AS F7_10_AVG_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN STDEV_INVO_AINITIALH END) AS F7_10_STDEV_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'zap_acone_po_terminie' THEN ILE_FAKTUR           END) AS F7_10_ILE_FAKTUR,

        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN AVG_DNI_DO_ZAPLATY   END) AS F7_00_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN STDEV_DNI_DO_ZAPLATY END) AS F7_00_STDEV_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN AVG_DNI_OPOZNIENIA   END) AS F7_00_AVG_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN STDEV_DNI_OPOZNIENIA END) AS F7_00_STDEV_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN SUM_INVO_AINITIALH   END) AS F7_00_SUM_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN AVG_INVO_AINITIALH   END) AS F7_00_AVG_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN STDEV_INVO_AINITIALH END) AS F7_00_STDEV_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_po_terminie' THEN ILE_FAKTUR           END) AS F7_00_ILE_FAKTUR,

        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN AVG_DNI_DO_ZAPLATY   END) AS F7_01_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN STDEV_DNI_DO_ZAPLATY END) AS F7_01_STDEV_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN AVG_DNI_OPOZNIENIA   END) AS F7_01_AVG_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN STDEV_DNI_OPOZNIENIA END) AS F7_01_STDEV_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN SUM_INVO_AINITIALH   END) AS F7_01_SUM_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN AVG_INVO_AINITIALH   END) AS F7_01_AVG_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN STDEV_INVO_AINITIALH END) AS F7_01_STDEV_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'niezap_acone_przed_terminem' THEN ILE_FAKTUR           END) AS F7_01_ILE_FAKTUR,

        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN AVG_DNI_DO_ZAPLATY   END) AS F7_99_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN STDEV_DNI_DO_ZAPLATY END) AS F7_99_STDEV_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN AVG_DNI_OPOZNIENIA   END) AS F7_99_AVG_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN STDEV_DNI_OPOZNIENIA END) AS F7_99_STDEV_DNI_OPOZNIENIA,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN SUM_INVO_AINITIALH   END) AS F7_99_SUM_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN AVG_INVO_AINITIALH   END) AS F7_99_AVG_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN STDEV_INVO_AINITIALH END) AS F7_99_STDEV_INVO_AINITIALH,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 7 AND SCENARIUSZ LIKE 'wszystkie_faktury' THEN ILE_FAKTUR           END) AS F7_99_ILE_FAKTUR,

        MAX(CASE WHEN PARAM_Z_ILU_DNI = 14 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN AVG_DNI_DO_ZAPLATY     END) AS F14_11_AVG_DNI_DO_ZAPLATY,
        MAX(CASE WHEN PARAM_Z_ILU_DNI = 14 AND SCENARIUSZ LIKE 'zap_acone_przed_terminem' THEN STDEV_DNI_DO_ZAPLATY   END) AS F14_11_STDEV_DNI_DO_ZAPLATY,
