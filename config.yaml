    CREATE TABLE IF NOT EXISTS swieta (
        nazwa TEXT,
        rodzaj TEXT,
        data DATE,
        rok INTEGER,
        mies INTEGER,
        dzien INTEGER,
        dzien_tyg TEXT
    );
  query_create_invo_view: |
    CREATE VIEW invo_view AS
    SELECT 
        INVO_NO,
        INVO_ADMNO,
        INVO_CLNTNO,
        INVO_DEBH_NO,
        INVO_DEBC_NO,
        DATE(INVO_INVDATE) AS INVO_INVDATE,
        DATE(INVO_VALUEDATE) AS INVO_VALUEDATE,
        DATE(INVO_DUEDATE) AS INVO_DUEDATE,
        CASE 
            WHEN INVO_MARKCODESPECDATE IS NOT NULL THEN DATE(INVO_MARKCODESPECDATE)
            ELSE NULL
        END AS INVO_MARKCODESPECDATE,
        CASE 
            WHEN INVO_MARKCODETEXTDATE IS NOT NULL THEN DATE(INVO_MARKCODETEXTDATE)
            ELSE NULL
        END AS INVO_MARKCODETEXTDATE,
        DATE(INVO_FINALPAYMENTDATE) AS INVO_FINALPAYMENTDATE,
        DATE(INVO_BOOKINGDATE) AS INVO_BOOKINGDATE,
        INVO_CURRENCY,
        INVO_AINITIALH,
        INVO_AINITIALC,
        -- INVO_ATAXI,
        INVO_MARKCODESPEC,
        CASE 
            WHEN INVO_MAXFINANCETIMPASSED IS NOT NULL THEN DATE(INVO_MAXFINANCETIMPASSED)
            ELSE NULL
        END AS INVO_MAXFINANCETIMPASSED,
        CASE 
            WHEN INVO_DATSTARTDELCREDEREINVST IS NOT NULL THEN DATE(INVO_DATSTARTDELCREDEREINVST)
            ELSE NULL
        END AS INVO_DATSTARTDELCREDEREINVST,
        INVO_NETDAYS,
        INVO_INVO_INVOICENO,
        INVO_TEXT,
        INVO_HOLDCODE,
        INVO_DUMMY
    FROM invo;  
  query_create_clhs_view: |
    CREATE VIEW clhs_view AS
    SELECT 
        CLHS_NO,
        CLHS_DEBC_NO,
        CLHS_DEBH_NO,
        CLHS_ADMNO,
        CLHS_CLNTNO,
        CASE 
        WHEN CLHS_DATCHANGED IS NOT NULL AND CLHS_TIMCHANGED IS NOT NULL THEN 
            datetime(
                substr(CAST(CLHS_DATCHANGED AS TEXT), 1, 4) || '-' ||
                substr(CAST(CLHS_DATCHANGED AS TEXT), 5, 2) || '-' ||
                substr(CAST(CLHS_DATCHANGED AS TEXT), 7, 2) || ' ' ||
                CASE
                    WHEN length(CAST(CLHS_TIMCHANGED AS TEXT)) = 6 THEN 
                        substr(CAST(CLHS_TIMCHANGED AS TEXT), 1, 2) || ':' || 
                        substr(CAST(CLHS_TIMCHANGED AS TEXT), 3, 2) || ':' || 
                        substr(CAST(CLHS_TIMCHANGED AS TEXT), 5, 2)
                    WHEN length(CAST(CLHS_TIMCHANGED AS TEXT)) = 5 THEN 
                        '0' || substr(CAST(CLHS_TIMCHANGED AS TEXT), 1, 1) || ':' || 
                        substr(CAST(CLHS_TIMCHANGED AS TEXT), 2, 2) || ':' || 
                        substr(CAST(CLHS_TIMCHANGED AS TEXT), 4, 2)
                    ELSE NULL
                END
            )
        WHEN CLHS_DATCHANGED IS NOT NULL THEN 
            datetime(substr(CAST(CLHS_DATCHANGED AS TEXT), 1, 4) || '-' ||
                     substr(CAST(CLHS_DATCHANGED AS TEXT), 5, 2) || '-' ||
                     substr(CAST(CLHS_DATCHANGED AS TEXT), 7, 2))
        ELSE NULL
    END AS CLHS_CHANGED_DATETIME,
        CASE 
            WHEN CLHS_DATVALID IS NOT NULL THEN strftime('%Y-%m-%d', CLHS_DATVALID)
            ELSE NULL
        END AS CLHS_DATVALID,
        CASE 
            WHEN CLHS_DATPRINTED IS NOT NULL THEN DATE(CLHS_DATPRINTED)
            ELSE NULL
        END AS CLHS_DATPRINTED,
        CLHS_LIMITOLD,
        CLHS_CURRENCYOLD,
        CLHS_LIMITNEW,
        CLHS_CURRENCYNEW,
        CLHS_TEXTCODE1,
        CLHS_TEXTCODE2,
        CLHS_TEXTCODE3,
        CLHS_VARIABLETEXT1,
        CLHS_VARIABLETEXT2,
        CLHS_USRID,
        CLHS_AUTOMATICDECISION,
        CLHS_NEWDEBTOR
    FROM clhs;  
  query_create_DEBC_view: |
    CREATE VIEW DEBC_view AS
    SELECT
        CASE 
            WHEN DEBC_CREDITLIMITDATE IS NOT NULL THEN DATE(DEBC_CREDITLIMITDATE)
            ELSE NULL
        END AS DEBC_CREDITLIMITDATE,
        CASE 
            WHEN DEBC_REINSURANCELIMSTART IS NOT NULL THEN DATE(DEBC_REINSURANCELIMSTART)
            ELSE NULL
        END AS DEBC_REINSURANCELIMSTART,
        CASE 
            WHEN DEBC_REINSURANCELIMEXPIRY IS NOT NULL THEN DATE(DEBC_REINSURANCELIMEXPIRY)
            ELSE NULL
        END AS DEBC_REINSURANCELIMEXPIRY,
        CASE 
            WHEN DEBC_DATECHANGE IS NOT NULL THEN DATE(DEBC_DATECHANGE)
            ELSE NULL
        END AS DEBC_DATECHANGE,
        DEBC_DEBH,
        DEBC_ADMNO,
        DEBC_CLNTNO,
        DEBC_MARKCODESPECIALACC,
        DEBC_BLOCKADEPERC,
        DEBC_CREDITLIMIT,
        DEBC_INTERNALPROLONG,
        DEBC_CLTC_TEXTCODE1,
        DEBC_CLTC_TEXTCODE2,
        DEBC_CLTC_TEXTCODE3,
        DEBC_REINSURANCECODE,
        DEBC_REINSURANCELIM,
        DEBC_REINSURANCELIMCURR,
        DEBC_REINSURANCEREPORTDAYS,
        DEBC_EXTERNALPROLONGCREDLIM,
        DEBC_REINSURANCETYPE,
        DEBC_MAXDAYSNEWINVOICES,
        DEBC_REINSURANCECONTRACT
    FROM debc;  
  query_create_dcmo_view: |
    CREATE VIEW dcmo_view AS  
    WITH maxes AS (
        SELECT
            DEBC_ADMNO,
            DEBC_NO,
            DEBC_DEBH,
            DEBC_CLNTNO,
            DCMO_YEAR,
            DCMO_MONTH,
            MAX(DCMO_ID) AS max_id
        FROM dcmo
        GROUP BY
            DEBC_ADMNO,
            DEBC_NO,
            DEBC_DEBH,
            DEBC_CLNTNO,
            DCMO_YEAR,
            DCMO_MONTH
    )    
    SELECT 
        d.DCMO_ID,
        d.DEBC_ADMNO,
        d.DEBC_NO,
        d.DEBC_DEBH,
        d.DEBC_CLNTNO,
        d.DCMO_YEAR,
        d.DCMO_MONTH,
        d.DCMO_PAIDAMOUNT,
        d.DCMO_PAIDAMOUNTINVDATE,
        d.DCMO_PAIDAMOUNTDUEDATE,
        d.DCMO_PAIDAMOUNTBEFOREDUEDATE,
        d.DCMO_PAIDAMOUNTAFTDUEDAT30,
        d.DCMO_PAIDAMOUNTAFTDUEDAT60,
        d.DCMO_PAIDAMOUNTAFTDUEDAT90,
        d.DCMO_PAIDAMOUNTAFTDUEDAT120,
        d.DCMO_PAIDAMOUNTAFTDUEDATG120,
        d.DCMO_PAIDNINVBEFDUEDATE,
        d.DCMO_PAIDNINVAFTDUEDATE30,
        d.DCMO_PAIDNINVAFTDUEDATE60,
        d.DCMO_PAIDNINVAFTDUEDATE90,
        d.DCMO_PAIDNINVAFTDUEDATE120,
        d.DCMO_PAIDNINVAFTDUEDATEG120,
        d.DCMO_TOTASALESDEBTNOTES,
        d.DCMO_TOTNDEBTNOTES,
        d.DCMO_TOTASALESCREDNOTES,
        d.DCMO_TOTNCREDNOTES,
        d.DCMO_AVGBALANCEOUTSTANDING,
        d.DCMO_BALANCEHI,
        d.DCMO_NDUNNINGLETTERS,
        d.DCMO_BALANCELO,
        d.DCMO_BALANCE,
        d.DCMO_NINVOICESOUTSTANDING,
        d.DCMO_PAIDAMOUNTDISPUTES,
        d.DCMO_PAIDAMOUNTPARTIALPAYM,
        d.DCMO_MONTHNUMBER,
        d.DEBC_MARKCODESPECIALACC,
        d.DEBC_BLOCKADEPERC,
        d.DEBC_CREDITLIMIT,
        CASE 
            WHEN d.DEBC_CREDITLIMITDATE IS NOT NULL THEN DATE(d.DEBC_CREDITLIMITDATE)
            ELSE NULL
        END AS DEBC_CREDITLIMITDATE,
        CASE 
            WHEN d.DEBC_INTERNALPROLONG IS NOT NULL THEN DATE(d.DEBC_INTERNALPROLONG)
            ELSE NULL
        END AS DEBC_INTERNALPROLONG,
        d.DEBC_CLTC_TEXTCODE1,
        d.DEBC_CLTC_TEXTCODE2,
        d.DEBC_CLTC_TEXTCODE3,
        d.DEBC_REINSURANCECODE,
        d.DEBC_REINSURANCELIM,
        d.DEBC_REINSURANCELIMCURR,
        CASE 
            WHEN d.DEBC_REINSURANCELIMSTART IS NOT NULL THEN DATE(d.DEBC_REINSURANCELIMSTART)
            ELSE NULL
        END AS DEBC_REINSURANCELIMSTART,
        d.DEBC_REINSURANCELIMEXPIRY,
        d.DEBC_REINSURANCEREPORTDAYS,
        CASE 
            WHEN d.DEBC_EXTERNALPROLONGCREDLIM IS NOT NULL THEN DATE(d.DEBC_EXTERNALPROLONGCREDLIM)
            ELSE NULL
        END AS DEBC_EXTERNALPROLONGCREDLIM,
        d.DEBC_REINSURANCETYPE,
        d.DEBC_MAXDAYSNEWINVOICES,
        d.DEBC_REINSURANCECONTRACT,
        CASE 
            WHEN d.DEBC_DATECHANGE IS NOT NULL THEN DATE(d.DEBC_DATECHANGE)
            ELSE NULL
        END AS DEBC_DATECHANGE
    FROM dcmo d
    JOIN maxes m
      ON d.DCMO_ID     = m.max_id
     AND d.DEBC_ADMNO  = m.DEBC_ADMNO
     AND d.DEBC_NO     = m.DEBC_NO
     AND d.DEBC_DEBH   = m.DEBC_DEBH
     AND d.DEBC_CLNTNO = m.DEBC_CLNTNO
     AND d.DCMO_YEAR   = m.DCMO_YEAR
     AND d.DCMO_MONTH  = m.DCMO_MONTH;
  query_create_INVO_CLHS_JOINED: |
    CREATE VIEW INVO_CLHS_JOINED AS
    SELECT 
        i.*,
        c.CLHS_CHANGED_DATETIME,
        c.CLHS_DATVALID,
        c.CLHS_DATPRINTED,
        c.CLHS_LIMITOLD,
        c.CLHS_CURRENCYOLD,
        c.CLHS_LIMITNEW,
        c.CLHS_CURRENCYNEW,
        c.CLHS_TEXTCODE1,
        c.CLHS_TEXTCODE2,
        c.CLHS_TEXTCODE3,
        c.CLHS_VARIABLETEXT1,
        c.CLHS_VARIABLETEXT2,
        c.CLHS_USRID,
        c.CLHS_AUTOMATICDECISION,
        c.CLHS_NEWDEBTOR,
        c.CLHS_NEXT_CHANGED_DATETIME
    FROM 
        INVO_VIEW i
    LEFT JOIN (
        -- Podzapytanie do wyznaczenia najwcześniejszego kolejnego wiersza
        SELECT 
            c1.CLHS_NO,
            c1.CLHS_DEBC_NO,
            c1.CLHS_DEBH_NO,
            c1.CLHS_ADMNO,
            c1.CLHS_CLNTNO,
            c1.CLHS_CHANGED_DATETIME,
            c1.CLHS_DATVALID,
            c1.CLHS_DATPRINTED,
            c1.CLHS_LIMITOLD,
            c1.CLHS_CURRENCYOLD,
            c1.CLHS_LIMITNEW,
            c1.CLHS_CURRENCYNEW,
            c1.CLHS_TEXTCODE1,
            c1.CLHS_TEXTCODE2,
            c1.CLHS_TEXTCODE3,
            c1.CLHS_VARIABLETEXT1,
            c1.CLHS_VARIABLETEXT2,
            c1.CLHS_USRID,
            c1.CLHS_AUTOMATICDECISION,
            c1.CLHS_NEWDEBTOR,
            MIN(c2.CLHS_CHANGED_DATETIME) AS CLHS_NEXT_CHANGED_DATETIME
        FROM 
            CLHS_VIEW c1
        LEFT JOIN 
            CLHS_VIEW c2
        ON 
            c2.CLHS_ADMNO = c1.CLHS_ADMNO
            AND (c1.CLHS_DEBH_NO = c2.CLHS_DEBH_NO)
            AND (c2.CLHS_CHANGED_DATETIME > c1.CLHS_CHANGED_DATETIME)
            AND (c1.CLHS_CLNTNO = c2.CLHS_CLNTNO)
        GROUP BY 
            c1.CLHS_NO,
            c1.CLHS_DEBC_NO,
            c1.CLHS_DEBH_NO,
            c1.CLHS_ADMNO,
            c1.CLHS_CLNTNO,
            c1.CLHS_CHANGED_DATETIME,
            c1.CLHS_DATVALID,
            c1.CLHS_DATPRINTED,
            c1.CLHS_LIMITOLD,
            c1.CLHS_CURRENCYOLD,
            c1.CLHS_LIMITNEW,
            c1.CLHS_CURRENCYNEW,
            c1.CLHS_TEXTCODE1,
            c1.CLHS_TEXTCODE2,
            c1.CLHS_TEXTCODE3,
            c1.CLHS_VARIABLETEXT1,
            c1.CLHS_VARIABLETEXT2,
            c1.CLHS_USRID,
            c1.CLHS_AUTOMATICDECISION,
            c1.CLHS_NEWDEBTOR
    ) c
    ON 
        c.CLHS_DEBH_NO = i.INVO_DEBH_NO
        AND c.CLHS_DEBC_NO = i.INVO_DEBC_NO
        AND c.CLHS_CLNTNO = i.INVO_CLNTNO
    AND 
        c.CLHS_ADMNO = i.INVO_ADMNO
    AND 
        (
            -- Limit rozpoczął się przed lub w trakcie życia faktury
            (CLHS_CHANGED_DATETIME <= i.INVO_FINALPAYMENTDATE or i.INVO_FINALPAYMENTDATE is null)
            AND 
            -- Limit zakończył się w trakcie życia faktury lub po nim
            (CLHS_NEXT_CHANGED_DATETIME >= i.INVO_INVDATE OR c.CLHS_NEXT_CHANGED_DATETIME IS NULL)
        );  
  query_create_group_cust_inv_days: |
    CREATE TABLE group_cust_inv_days (
        INVO_NO TEXT,
        INVO_ADMNO TEXT,
        INVO_CLNTNO TEXT,
        INVO_DEBH_NO TEXT,
        INVO_DEBC_NO TEXT,
        INVO_INVDATE DATETIME,
        DZIEN DATETIME,
        ROK INTEGER,
        MIESIAC INTEGER,
        INVO_FINALPAYMENTDATE DATETIME
    );   
  grouped_query: |
    SELECT 
        g.INVO_ADMNO,
        g.INVO_CLNTNO,
        g.INVO_DEBH_NO,
        g.INVO_DEBC_NO,
        g.DZIEN,
        g.MIESIAC,
        g.ROK
    FROM 
        group_cust_inv_days g
    GROUP BY 
        g.INVO_ADMNO,
        g.INVO_CLNTNO,
        g.INVO_DEBH_NO,
        g.INVO_DEBC_NO,
        g.DZIEN,
        g.MIESIAC,
        g.ROK;  
  query_create_summary_client_days_view: |
    CREATE VIEW summary_client_days_view AS
    SELECT 
        g.INVO_ADMNO,
        g.INVO_CLNTNO,
        g.INVO_DEBH_NO,
        g.INVO_DEBC_NO,
        g.DZIEN,
        g.MIESIAC,
        g.ROK,
    
        -- Suma zapłaconych faktur
        COALESCE((SELECT SUM(i.INVO_AINITIALH)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO
        ), 0) AS SUMA_ZAPLACONE,
    
        -- Suma zapłaconych faktur
        COALESCE((SELECT SUM(i.INVO_AINITIALH) * (SUM(julianday(i.INVO_FINALPAYMENTDATE)) - SUM(julianday(i.INVO_INVDATE)))
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS SUMA_RAZY_CZAS_ZAPLACONE,
    
        -- Licznik zapłaconych faktur
        COALESCE((SELECT COUNT(*)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS LICZNIK_ZAPLACONE,
    
        -- Suma zapłaconych przed terminem
        COALESCE((SELECT SUM(i.INVO_AINITIALH)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE <= i.INVO_DUEDATE
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS SUMA_PRZED_TERMINEM,
    
        -- Licznik zapłaconych przed terminem
        COALESCE((SELECT COUNT(*)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE <= i.INVO_DUEDATE
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS LICZNIK_PRZED_TERMINEM,
    
        -- Suma zapłaconych po terminie
        COALESCE((SELECT SUM(i.INVO_AINITIALH)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE > i.INVO_DUEDATE
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS SUMA_PO_TERMINIE,
    
        -- Licznik zapłaconych po terminie
        COALESCE((SELECT COUNT(*)
         FROM invo_view i
         WHERE i.INVO_FINALPAYMENTDATE IS NOT NULL
           AND i.INVO_FINALPAYMENTDATE > i.INVO_DUEDATE
           AND i.INVO_FINALPAYMENTDATE < g.DZIEN
           AND i.INVO_FINALPAYMENTDATE >= DATE(g.DZIEN, 'start of month')
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS LICZNIK_PO_TERMINIE,
    
        -- Suma faktur wystawionych w ostatnim miesiącu
        COALESCE((SELECT SUM(i.INVO_AINITIALH)
         FROM invo_view i
         WHERE i.INVO_INVDATE >= DATE(g.DZIEN, 'start of month') 
           AND i.INVO_INVDATE < g.DZIEN
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS SUMA_WYSTAWIONYCH,
    
        -- Licznik faktur wystawionych w ostatnim miesiącu
        COALESCE((SELECT COUNT(*)
         FROM invo_view i
         WHERE i.INVO_INVDATE >= DATE(g.DZIEN, 'start of month') 
           AND i.INVO_INVDATE < g.DZIEN
           AND i.INVO_ADMNO = g.INVO_ADMNO
           AND i.INVO_CLNTNO = g.INVO_CLNTNO
           AND (i.INVO_DEBH_NO = g.INVO_DEBH_NO AND i.INVO_DEBC_NO = g.INVO_DEBC_NO)
        ), 0) AS LICZNIK_WYSTAWIONYCH
    
    FROM 
        group_cust_inv_days g
    GROUP BY 
        g.INVO_ADMNO,
        g.INVO_CLNTNO,
        g.INVO_DEBH_NO,
        g.INVO_DEBC_NO,
        g.DZIEN,
        g.MIESIAC,
        g.ROK;  
