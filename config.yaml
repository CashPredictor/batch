    AND (g.INVO_DEBH_NO = d3.DEBC_DEBH AND g.INVO_DEBC_NO = d3.DEBC_NO)
    AND g.INVO_CLNTNO = d3.DEBC_CLNTNO
    AND d3.DCMO_YEAR  = CAST(strftime('%Y'    , date(g.DZIEN,'start of month','-1 day', '-' || 3 || ' months')) AS INTEGER)
    AND d3.DCMO_MONTH = CAST(strftime('%m'    , date(g.DZIEN,'start of month','-1 day', '-' || 3 || ' months')) AS INTEGER)
        
        LEFT JOIN dcmo_view d6
