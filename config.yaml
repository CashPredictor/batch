            WHEN DEBC_CREDITLIMITDATE IS NOT NULL THEN DATE(DEBC_CREDITLIMITDATE)
            ELSE NULL
        END AS DEBC_CREDITLIMITDATE,
        CASE 
            WHEN DEBC_REINSURANCELIMSTART IS NOT NULL THEN DATE(DEBC_REINSURANCELIMSTART)
            ELSE NULL
